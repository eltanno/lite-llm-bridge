# compose.yaml
# Use Compose v2: `docker compose up -d` to start, `docker compose down` to stop.

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    # Pinned tag only. Never the moving 'latest' tag, and never the known-malware
    # credential-stealing PyPI builds from late 2025 (see README / research).
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro    # :ro = read-only inside the container
    env_file:
      - .env                                  # injects LITELLM_MASTER_KEY and OLLAMA_API_KEY
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
