# config.yaml — LiteLLM model catalog (real-name design)
# Committed to repo — contains NO secrets (.env holds them, referenced via os.environ/VAR_NAME).
#
# DESIGN: models are exposed by their REAL provider IDs (a stable catalog). Which model backs
# Claude Code's opus/sonnet/haiku TIERS is chosen on the CLIENT via ANTHROPIC_DEFAULT_*_MODEL
# (see ./bin/claude-gw). Swapping a tier = change an env var (NO container restart). You only edit
# this file to ADD or REMOVE a model from the catalog.
#
# - Anthropic models use the real ID so Claude Code applies correct capabilities (Haiku = no
#   thinking/effort; Opus/Sonnet = thinking). The Max OAuth bearer is forwarded ONLY to the
#   Anthropic group (model_group_settings) — Ollama models authenticate with OLLAMA_API_KEY.
# - Ollama models reach Ollama Cloud directly (openai/ + https://ollama.com/v1, no local daemon).
#   drop_params strips Anthropic-only params Claude Code sends. Per-model thinking can be tuned with
#   `reasoning_effort: none|low|medium|high` (default: the model's own behavior).

model_list:

  # ── Anthropic — Claude Max via OAuth-token forwarding (no api_key; bearer is forwarded) ──
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001

  # ── Ollama Cloud — OpenAI-compatible API, no local daemon (/v1 MUST be included) ──
  - model_name: deepseek-v4-pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
      max_input_tokens: 262144
  - model_name: deepseek-v4-flash
    litellm_params:
      model: openai/deepseek-v4-flash
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
      max_input_tokens: 262144
  - model_name: kimi-k2.6
    litellm_params:
      model: openai/kimi-k2.6
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      max_input_tokens: 262144
  - model_name: "qwen3.5:397b"
    litellm_params:
      model: "openai/qwen3.5:397b"
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      max_input_tokens: 262144
  - model_name: glm-5.1
    litellm_params:
      model: openai/glm-5.1
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      max_input_tokens: 202752
  - model_name: minimax-m2.7
    litellm_params:
      model: openai/minimax-m2.7
      api_base: https://ollama.com/v1
      api_key: os.environ/OLLAMA_API_KEY
    model_info:
      max_input_tokens: 204800

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

# Forward Claude Code's Max OAuth bearer ONLY to the Anthropic models.
# Ollama models must never receive the bearer (they use OLLAMA_API_KEY).
model_group_settings:
  forward_client_headers_to_llm_api:
    - claude-opus-4-7
    - claude-sonnet-4-6
    - claude-haiku-4-5-20251001

litellm_settings:
  drop_params: true   # strip unknown/Anthropic-only params before sending to OpenAI-compat (Ollama)
